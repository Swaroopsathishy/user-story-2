[pytest]
# ─── Test discovery ───────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ─── Output style ─────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# ─── Logging capture ──────────────────────────────────────────────────────────
log_cli = true
log_cli_level = WARNING
